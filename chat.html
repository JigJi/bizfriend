<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <title>FriendTa - พูดคุย</title>
  <style>body{font-family:'Inter','LINE Seed Sans TH',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}</style>
    <script>(function(){var t=localStorage.getItem("theme");if(t==="dark"||(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches))document.documentElement.classList.add("dark")})();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://liqjwpiypsvuyzxnydbu.supabase.co" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'LINE Seed Sans TH', 'sans-serif'] },
          colors: { primary: '#2563eb', 'primary-container': '#3b82f6', surface: '#f7f9fb', 'surface-low': '#f2f4f6' }
        }
      }
    }
  </script>
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CVBGFDMX64"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CVBGFDMX64');
  </script>
</head>
<body class="font-sans bg-surface text-slate-800 antialiased">

  <!-- ===== Desktop Sidebar Nav ===== -->
  <nav class="sidebar-nav custom-scrollbar">
    <a href="network.html" class="px-3 mb-8 block">
      <span class="logo-font text-2xl"><img src="/assets/img/logo.png" alt="FriendTa" class="brand-logo"></span>
    </a>
    <div class="flex flex-col gap-1">
      <a href="network.html" class="nav-item">
        <span class="material-symbols-rounded">person_search</span>
        หาเพื่อน
      </a>
      <a href="chat.html" class="nav-item active">
        <span class="relative inline-flex">
          <span class="material-symbols-rounded">chat</span>
          <span data-unread-badge class="hidden absolute -top-1 -right-1.5 min-w-[1.125rem] h-[1.125rem] px-1 rounded-full bg-red-500 text-white text-[0.65rem] font-bold flex items-center justify-center leading-none">0</span>
        </span>
        พูดคุย
      </a>
    </div>
  </nav>

  <!-- ===== Main Content ===== -->
  <main class="main-content !pb-0 lg:!pb-0">
    <!-- Mobile Header -->
    <div class="hide-desktop flex items-center justify-between mb-4">
      <div class="flex items-center gap-2">
        <span class="logo-font text-xl"><img src="/assets/img/logo.png" alt="FriendTa" class="brand-logo"></span>
      </div>
      <div class="flex items-center gap-2">
        <button class="theme-toggle" aria-label="สลับโหมดมืด/สว่าง" title="มืด/สว่าง"><span class="material-symbols-rounded icon-sun">light_mode</span><span class="material-symbols-rounded icon-moon">dark_mode</span></button>
        <button class="blur-toggle" aria-label="เปิด/ปิด blur รูปภาพ" title="เปิด/ปิด blur รูปภาพ">
          <span class="material-symbols-rounded icon-on text-slate-600">visibility_off</span>
          <span class="material-symbols-rounded icon-off">visibility</span>
        </button>
      </div>
    </div>

    <!-- Desktop Page Header -->
    <div class="hide-mobile flex items-center justify-between mb-4">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">พูดคุย</h1>
        <p class="text-sm text-slate-500 mt-0.5">แชทกับเพื่อนของคุณ</p>
      </div>
      <div class="flex items-center gap-3">
        <button class="theme-toggle" aria-label="สลับโหมดมืด/สว่าง" title="มืด/สว่าง"><span class="material-symbols-rounded icon-sun">light_mode</span><span class="material-symbols-rounded icon-moon">dark_mode</span></button>
        <button class="blur-toggle" aria-label="เปิด/ปิด blur รูปภาพ" title="เปิด/ปิด blur รูปภาพ">
          <span class="material-symbols-rounded icon-on text-slate-600">visibility_off</span>
          <span class="material-symbols-rounded icon-off">visibility</span>
        </button>
        <div class="relative">
          <button class="user-menu-toggle flex items-center gap-2 pl-2 pr-2.5 py-1.5 rounded-full bg-white border border-slate-200 hover:bg-slate-50 transition-colors">
            <div class="w-7 h-7 rounded-full bg-blue-100 flex items-center justify-center text-primary font-semibold text-xs user-avatar-initial">?</div>
            <span class="text-sm font-medium text-slate-700 user-display-name">...</span>
            <span class="material-symbols-rounded text-slate-400 text-lg">expand_more</span>
          </button>
          <div class="user-menu">
            <a href="profile.html">
              <span class="material-symbols-rounded text-lg">person</span>
              โปรไฟล์
            </a>
            <a href="settings.html">
              <span class="material-symbols-rounded text-lg">settings</span>
              ตั้งค่า
            </a>
            <div class="divider"></div>
            <a href="#" class="danger" data-action="logout">
              <span class="material-symbols-rounded text-lg">logout</span>
              ออกจากระบบ
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="chat-main flex bg-white rounded-2xl border border-slate-200/60 overflow-hidden">

      <!-- Chat List Sidebar -->
      <div class="chat-sidebar-panel w-full lg:w-80 flex flex-col border-r border-slate-100 bg-white flex-shrink-0">
        <!-- Header -->
        <div class="p-4 border-b border-slate-100">
          <div class="relative">
            <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
            <input id="chat-search-input" type="text" placeholder="ค้นหาชื่อ..." class="w-full pl-9 pr-4 py-2 bg-slate-50 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 border border-transparent focus:border-primary">
          </div>
          <div class="flex items-center gap-1.5 mt-3">
            <!-- Status dropdown -->
            <div class="relative" id="chat-status-wrap">
              <button id="chat-status-btn" type="button" onclick="bizChat.toggleStatusMenu(event)" class="px-3 py-1 rounded-full text-xs font-medium bg-primary text-white flex items-center gap-1 hover:opacity-90">
                <span id="chat-status-label">ทั้งหมด</span>
                <span class="material-symbols-rounded text-sm">expand_more</span>
              </button>
              <div id="chat-status-menu" class="hidden absolute left-0 top-full mt-1 w-40 bg-white rounded-xl border border-slate-200 shadow-xl z-50 overflow-hidden">
                <button type="button" onclick="bizChat.setStatus('all')" class="w-full text-left px-4 py-2 text-xs hover:bg-slate-50 text-slate-700">ทั้งหมด</button>
                <button type="button" onclick="bizChat.setStatus('unread')" class="w-full text-left px-4 py-2 text-xs hover:bg-slate-50 text-slate-700">ยังไม่ได้อ่าน</button>
                <button type="button" onclick="bizChat.setStatus('read')" class="w-full text-left px-4 py-2 text-xs hover:bg-slate-50 text-slate-700">อ่านแล้ว</button>
              </div>
            </div>

            <!-- Favorites toggle (right-aligned) -->
            <button id="chat-fav-btn" type="button" onclick="bizChat.toggleFavoriteFilter()" class="ml-auto px-3 py-1 rounded-full text-xs font-medium bg-slate-100 text-slate-600 hover:bg-slate-200 flex items-center gap-1">
              <span class="material-symbols-rounded text-sm">favorite</span>เพื่อนที่ถูกใจ
            </button>
          </div>
        </div>

        <!-- Chat List -->
        <div id="chat-list" class="flex-1 overflow-y-auto custom-scrollbar p-2">
          <div class="p-6 text-center text-sm text-slate-400">กำลังโหลด...</div>
        </div>
      </div>

      <!-- Empty state — แสดงเมื่อยังไม่ได้เลือก conv -->
      <div id="chat-empty-state" class="flex-1 flex flex-col items-center justify-center text-center p-8 text-slate-400">
        <span class="material-symbols-rounded text-6xl mb-3">forum</span>
        <div class="text-base font-medium mb-1">เลือกการสนทนา</div>
        <div class="text-xs">หรือเริ่มแชทใหม่จากหน้า <a href="network.html" class="text-primary hover:underline">หาเพื่อน</a></div>
      </div>

      <!-- Active Chat Area -->
      <div id="chat-area" class="hidden flex-1 flex flex-col min-w-0">
        <!-- Chat Header -->
        <div class="flex items-center justify-between px-4 lg:px-6 py-3 border-b border-slate-100">
          <div class="flex items-center gap-3">
            <button class="hide-desktop w-8 h-8 rounded-full hover:bg-slate-100 flex items-center justify-center" onclick="document.querySelector('.chat-sidebar-panel').classList.toggle('show')">
              <span class="material-symbols-rounded text-slate-600 text-xl">arrow_back</span>
            </button>
            <div id="chat-header-avatar"></div>
            <div>
              <div id="chat-header-name" class="text-sm font-semibold text-slate-800">...</div>
            </div>
          </div>
          <div class="relative" id="chat-menu-wrap">
            <button id="chat-menu-btn" type="button" onclick="bizChat.toggleMenu(event)" class="w-9 h-9 rounded-full hover:bg-slate-100 flex items-center justify-center" title="ตัวเลือก">
              <span class="material-symbols-rounded text-slate-500">more_vert</span>
            </button>
            <div id="chat-menu" class="hidden absolute right-0 top-full mt-1 w-48 bg-white rounded-xl border border-slate-200 shadow-xl z-50 overflow-hidden">
              <a id="chat-menu-profile" href="#" class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50">
                <span class="material-symbols-rounded text-base text-slate-500">person</span>
                ดูโปรไฟล์
              </a>
              <button type="button" onclick="bizChat.blockCurrent()" class="w-full text-left flex items-center gap-2 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 border-t border-slate-100">
                <span class="material-symbols-rounded text-base">block</span>
                บล็อกผู้ใช้นี้
              </button>
            </div>
          </div>
        </div>

        <!-- Messages -->
        <div id="messages-container" class="flex-1 overflow-y-auto custom-scrollbar p-4 lg:p-6 flex flex-col gap-4"></div>

        <!-- Input Area -->
        <div class="border-t border-slate-100 p-3 lg:p-4">
          <div class="flex items-end gap-2">
            <input id="chat-file-input" type="file" accept="image/*" class="hidden">
            <button id="chat-attach-btn" title="ส่งรูป" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 flex items-center justify-center flex-shrink-0 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
              <span class="material-symbols-rounded text-xl">image</span>
            </button>
            <input
              id="chat-input"
              type="text"
              autocomplete="off"
              placeholder="พิมพ์ข้อความ..."
              class="flex-1 bg-slate-50 rounded-2xl px-4 py-3 text-sm text-slate-800 placeholder-slate-400 border border-transparent focus:border-primary/30 focus:bg-white focus:outline-none transition-colors"
            >
            <button id="chat-send-btn" class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center flex-shrink-0 hover:bg-primary-container transition-colors">
              <span class="material-symbols-rounded text-xl">send</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- ===== Mobile Bottom Nav ===== -->
  <nav class="bottom-nav">
    <a href="network.html" class="nav-item">
      <span class="material-symbols-rounded">person_search</span>
      หาเพื่อน
    </a>
    <a href="chat.html" class="nav-item active">
      <span class="relative inline-flex">
        <span class="material-symbols-rounded">chat</span>
        <span data-unread-badge class="hidden absolute -top-0.5 -right-1.5 min-w-[1.125rem] h-[1.125rem] px-1 rounded-full bg-red-500 text-white text-[0.65rem] font-bold flex items-center justify-center leading-none">0</span>
      </span>
      พูดคุย
    </a>
    <a href="profile.html" class="nav-item">
      <div class="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center text-primary font-semibold text-[0.55rem] user-avatar-initial">?</div>
      โปรไฟล์
    </a>
  </nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
