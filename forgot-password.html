<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <title>FriendTa - ลืมรหัสผ่าน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'LINE Seed Sans TH', 'sans-serif'] },
          colors: { primary: '#2563eb', 'primary-container': '#3b82f6', surface: '#f7f9fb', 'surface-low': '#f2f4f6' }
        }
      }
    }
  </script>
</head>
<body class="font-sans bg-surface text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <span class="logo-font text-4xl"><img src="/assets/img/logo.png" alt="FriendTa" class="brand-logo"></span>
      <p class="text-sm text-slate-500 mt-2">ชุมชนหาเพื่อนคุย เพื่อนเที่ยว เพื่อนคู่ใจ</p>
    </div>

    <div class="bg-white border border-slate-200/60 rounded-2xl p-6">
      <h1 class="text-xl font-bold text-slate-900 mb-1">ลืมรหัสผ่าน</h1>
      <p class="text-sm text-slate-500 mb-6">กรอกอีเมลที่ใช้สมัคร เราจะส่งลิงก์รีเซ็ตให้</p>

      <div id="forgot-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600"></div>

      <div id="forgot-success" class="hidden mb-4 p-4 bg-green-50 border border-green-200 rounded-xl">
        <div class="flex items-start gap-2">
          <span class="material-symbols-rounded text-green-600 text-xl">mark_email_read</span>
          <div class="flex-1">
            <p class="text-sm font-semibold text-green-800">ส่งลิงก์รีเซ็ตแล้ว</p>
            <p class="text-xs text-green-700 mt-1">
              เราส่งลิงก์ไปที่<br>
              <span id="success-email" class="font-medium"></span>
            </p>
            <p class="text-xs text-green-700/80 mt-3">
              กรุณาเปิดอีเมลแล้วคลิกลิงก์เพื่อตั้งรหัสผ่านใหม่<br>
              หากไม่พบ ลองเช็คโฟลเดอร์ spam/junk
            </p>
          </div>
        </div>
      </div>

      <form id="forgot-form" class="flex flex-col gap-4">
        <div>
          <label class="text-sm font-medium text-slate-700 mb-1.5 block">อีเมล</label>
          <input type="email" id="forgot-email" required placeholder="you@example.com"
            class="w-full px-4 py-2.5 bg-slate-50 rounded-xl text-sm border border-transparent focus:border-primary/30 focus:bg-white focus:outline-none transition-colors">
        </div>
        <button type="submit" id="forgot-btn" class="btn-primary w-full !py-2.5 mt-2">
          ส่งลิงก์รีเซ็ต
        </button>
      </form>

      <div class="mt-5 text-center text-sm text-slate-500">
        จำได้แล้ว?
        <a href="login.html" class="text-primary font-medium hover:underline">เข้าสู่ระบบ</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      var btn = document.getElementById('forgot-btn');
      var errorEl = document.getElementById('forgot-error');
      var successEl = document.getElementById('forgot-success');
      var form = document.getElementById('forgot-form');
      errorEl.classList.add('hidden');

      var email = document.getElementById('forgot-email').value.trim();
      btn.textContent = 'กำลังส่ง...';
      btn.disabled = true;

      var result = await bizAuth.sendPasswordRecovery(email);

      if (result.error) {
        errorEl.textContent = result.error;
        errorEl.classList.remove('hidden');
        btn.textContent = 'ส่งลิงก์รีเซ็ต';
        btn.disabled = false;
      } else {
        document.getElementById('success-email').textContent = email;
        form.classList.add('hidden');
        successEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
