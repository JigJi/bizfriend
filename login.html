<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <title>FriendTa - เข้าสู่ระบบ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'LINE Seed Sans TH', 'sans-serif'] },
          colors: { primary: '#2563eb', 'primary-container': '#3b82f6', surface: '#f7f9fb', 'surface-low': '#f2f4f6' }
        }
      }
    }
  </script>
</head>
<body class="font-sans bg-surface text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <span class="logo-font text-4xl"><img src="/assets/img/logo.png" alt="FriendTa" class="brand-logo"></span>
      <p class="text-sm text-slate-500 mt-2">ชุมชนหาเพื่อนคุย เพื่อนเที่ยว เพื่อนคู่ใจ</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white border border-slate-200/60 rounded-2xl p-6">
      <h1 class="text-xl font-bold text-slate-900 mb-1">เข้าสู่ระบบ</h1>
      <p class="text-sm text-slate-500 mb-6">ยินดีต้อนรับกลับมา</p>

      <!-- Error Message -->
      <div id="login-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600"></div>

      <!-- Email not confirmed — resend prompt -->
      <div id="login-resend-box" class="hidden mb-4 p-3 bg-amber-50 border border-amber-200 rounded-xl">
        <p class="text-sm text-amber-800 mb-2">
          <span class="material-symbols-rounded align-middle text-base mr-1">mail</span>
          บัญชีนี้ยังไม่ได้ยืนยันอีเมล
        </p>
        <button id="login-resend-btn" type="button" class="w-full py-2 rounded-full border border-amber-300 bg-white hover:bg-amber-50 text-sm font-medium text-amber-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          ส่งอีเมลยืนยันอีกครั้ง
        </button>
        <p id="login-resend-status" class="hidden text-center text-xs mt-2"></p>
      </div>

      <form id="login-form" class="flex flex-col gap-4">
        <div>
          <label class="text-sm font-medium text-slate-700 mb-1.5 block">อีเมล</label>
          <input type="email" id="login-email" required placeholder="you@example.com"
            class="w-full px-4 py-2.5 bg-slate-50 rounded-xl text-sm border border-transparent focus:border-primary/30 focus:bg-white focus:outline-none transition-colors">
        </div>
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="text-sm font-medium text-slate-700">รหัสผ่าน</label>
            <a href="forgot-password.html" class="text-xs text-primary hover:underline">ลืมรหัสผ่าน?</a>
          </div>
          <input type="password" id="login-password" required placeholder="••••••••"
            class="w-full px-4 py-2.5 bg-slate-50 rounded-xl text-sm border border-transparent focus:border-primary/30 focus:bg-white focus:outline-none transition-colors">
        </div>
        <button type="submit" id="login-btn" class="btn-primary w-full !py-2.5 mt-2">
          เข้าสู่ระบบ
        </button>
      </form>

      <!-- OAuth section — ซ่อนบน dev (local Supabase ไม่ได้ enable Google provider) -->
      <div data-oauth-section>
      <!-- Divider -->
      <div class="flex items-center gap-3 my-5">
        <div class="flex-1 h-px bg-slate-200"></div>
        <span class="text-xs text-slate-400">หรือ</span>
        <div class="flex-1 h-px bg-slate-200"></div>
      </div>

      <!-- Google Login -->
      <button onclick="bizAuth.loginWithGoogle()" class="w-full flex items-center justify-center gap-2 py-2.5 rounded-full border border-slate-200 bg-white hover:bg-slate-50 text-sm font-medium text-slate-700 transition-colors">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        เข้าสู่ระบบด้วย Google
      </button>
      </div><!-- /data-oauth-section -->

      <div class="mt-5 text-center text-sm text-slate-500">
        ยังไม่มีบัญชี?
        <a href="register.html" class="text-primary font-medium hover:underline">สมัครสมาชิก</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/password-toggle.js"></script>
  <script src="js/auth.js"></script>
  <script>
    var lastAttemptedEmail = '';

    function startLoginResendCooldown(seconds) {
      var btn = document.getElementById('login-resend-btn');
      var remaining = seconds;
      btn.disabled = true;
      btn.textContent = 'ส่งอีกครั้งใน ' + remaining + ' วินาที';
      var timer = setInterval(function () {
        remaining--;
        if (remaining <= 0) {
          clearInterval(timer);
          btn.disabled = false;
          btn.textContent = 'ส่งอีเมลยืนยันอีกครั้ง';
        } else {
          btn.textContent = 'ส่งอีกครั้งใน ' + remaining + ' วินาที';
        }
      }, 1000);
    }

    document.getElementById('login-resend-btn').addEventListener('click', async function () {
      if (!lastAttemptedEmail) return;
      var statusEl = document.getElementById('login-resend-status');
      statusEl.classList.add('hidden');

      var result = await bizAuth.resendConfirmation(lastAttemptedEmail);
      if (result.error) {
        statusEl.textContent = result.error;
        statusEl.className = 'text-center text-xs mt-2 text-red-600';
      } else {
        statusEl.textContent = 'ส่งอีเมลใหม่แล้ว กรุณาตรวจสอบกล่องจดหมาย';
        statusEl.className = 'text-center text-xs mt-2 text-green-700';
      }
      statusEl.classList.remove('hidden');
      startLoginResendCooldown(60);
    });

    // ===== แสดงเหตุผลถ้าถูกเด้งมาจาก checkAuth (session ที่ยังไม่ยืนยันอีเมล) =====
    if (new URLSearchParams(location.search).get('unconfirmed') === '1') {
      var errEl = document.getElementById('login-error');
      errEl.textContent = 'บัญชีนี้ยังไม่ได้ยืนยันอีเมล กรุณาเช็คกล่องจดหมายแล้วคลิกลิงก์ยืนยันก่อนเข้าสู่ระบบ';
      errEl.classList.remove('hidden');
    }

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      var btn = document.getElementById('login-btn');
      var errorEl = document.getElementById('login-error');
      var resendBox = document.getElementById('login-resend-box');
      errorEl.classList.add('hidden');
      resendBox.classList.add('hidden');
      btn.textContent = 'กำลังเข้าสู่ระบบ...';
      btn.disabled = true;

      var email = document.getElementById('login-email').value;
      var password = document.getElementById('login-password').value;
      lastAttemptedEmail = email;
      var result = await bizAuth.login(email, password);

      if (result.error) {
        errorEl.textContent = result.error;
        errorEl.classList.remove('hidden');
        if (result.needsConfirm) {
          resendBox.classList.remove('hidden');
        }
        btn.textContent = 'เข้าสู่ระบบ';
        btn.disabled = false;
      } else {
        window.location.href = 'network.html';
      }
    });
  </script>
</body>
</html>
