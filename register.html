<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <title>FriendTa - สมัครสมาชิก</title>
  <style>body{font-family:'Inter','LINE Seed Sans TH',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}</style>
    <script>(function(){var t=localStorage.getItem("theme");if(t==="dark"||(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches))document.documentElement.classList.add("dark")})();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'LINE Seed Sans TH', 'sans-serif'] },
          colors: { primary: '#2563eb', 'primary-container': '#3b82f6', surface: '#f7f9fb', 'surface-low': '#f2f4f6' }
        }
      }
    }
  </script>
</head>
<body class="font-sans bg-surface text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <span class="logo-font text-4xl"><img src="/assets/img/logo.png" alt="FriendTa" class="brand-logo"></span>
      <p class="text-sm text-slate-500 mt-2">ชุมชนหาเพื่อนคุย เพื่อนเที่ยว เพื่อนคู่ใจ</p>
    </div>

    <!-- Register Card -->
    <div class="bg-white border border-slate-200/60 rounded-2xl p-6">
      <h1 class="text-xl font-bold text-slate-900 mb-1">สมัครสมาชิก</h1>
      <p class="text-sm text-slate-500 mb-6">สร้างบัญชีใหม่เพื่อเริ่มต้น</p>

      <!-- Error Message -->
      <div id="register-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600"></div>

      <!-- Success State (ซ่อน form + แสดงข้อความยืนยัน) -->
      <div id="register-success" class="hidden">
        <div class="mb-4 p-4 bg-green-50 border border-green-200 rounded-xl">
          <div class="flex items-start gap-2 mb-2">
            <span class="material-symbols-rounded text-green-600 text-xl">mark_email_read</span>
            <div class="flex-1">
              <p class="text-sm font-semibold text-green-800">ส่งอีเมลยืนยันแล้ว</p>
              <p class="text-xs text-green-700 mt-1">
                เราส่งลิงก์ยืนยันไปที่<br>
                <span id="success-email" class="font-medium"></span>
              </p>
            </div>
          </div>
          <p class="text-xs text-green-700/80 mt-3 pl-7">
            กรุณาเปิดอีเมลแล้วคลิกลิงก์เพื่อเปิดใช้งานบัญชี<br>
            หากไม่พบ ลองเช็คโฟลเดอร์ spam/junk
          </p>
        </div>

        <button id="resend-btn" type="button" class="w-full py-2.5 rounded-full border border-slate-200 bg-white hover:bg-slate-50 text-sm font-medium text-slate-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          ส่งอีเมลอีกครั้ง
        </button>
        <p id="resend-status" class="hidden text-center text-xs mt-2"></p>

        <a href="login.html" class="block text-center text-sm text-primary font-medium hover:underline mt-4">
          กลับไปหน้าเข้าสู่ระบบ
        </a>
      </div>

      <div id="register-body">
      <form id="register-form" class="flex flex-col gap-4">
        <div>
          <label class="text-sm font-medium text-slate-700 mb-1.5 block">ชื่อที่แสดง</label>
          <input type="text" id="reg-name" required placeholder="ชื่อเล่น หรือนามแฝง"
            class="w-full px-4 py-2.5 bg-slate-50 rounded-xl text-sm border border-transparent focus:border-primary/30 focus:bg-white focus:outline-none transition-colors">
        </div>
        <div>
          <label class="text-sm font-medium text-slate-700 mb-1.5 block">อีเมล</label>
          <input type="email" id="reg-email" required placeholder="you@example.com"
            class="w-full px-4 py-2.5 bg-slate-50 rounded-xl text-sm border border-transparent focus:border-primary/30 focus:bg-white focus:outline-none transition-colors">
        </div>
        <div>
          <label class="text-sm font-medium text-slate-700 mb-1.5 block">รหัสผ่าน</label>
          <input type="password" id="reg-password" required minlength="6" placeholder="อย่างน้อย 6 ตัวอักษร"
            class="w-full px-4 py-2.5 bg-slate-50 rounded-xl text-sm border border-transparent focus:border-primary/30 focus:bg-white focus:outline-none transition-colors">
        </div>
        <div>
          <label class="text-sm font-medium text-slate-700 mb-1.5 block">ยืนยันรหัสผ่าน</label>
          <input type="password" id="reg-password-confirm" required minlength="6" placeholder="กรอกรหัสผ่านอีกครั้ง"
            class="w-full px-4 py-2.5 bg-slate-50 rounded-xl text-sm border border-transparent focus:border-primary/30 focus:bg-white focus:outline-none transition-colors">
        </div>
        <button type="submit" id="register-btn" class="btn-primary w-full !py-2.5 mt-2">
          สมัครสมาชิก
        </button>
      </form>

      <!-- OAuth section — ซ่อนบน dev (local Supabase ไม่ได้ enable Google provider) -->
      <div data-oauth-section>
      <!-- Divider -->
      <div class="flex items-center gap-3 my-5">
        <div class="flex-1 h-px bg-slate-200"></div>
        <span class="text-xs text-slate-400">หรือ</span>
        <div class="flex-1 h-px bg-slate-200"></div>
      </div>

      <!-- Google Login -->
      <button onclick="bizAuth.loginWithGoogle()" class="w-full flex items-center justify-center gap-2 py-2.5 rounded-full border border-slate-200 bg-white hover:bg-slate-50 text-sm font-medium text-slate-700 transition-colors">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        สมัครด้วย Google
      </button>
      </div><!-- /data-oauth-section -->

      <div class="mt-5 text-center text-sm text-slate-500">
        มีบัญชีแล้ว?
        <a href="login.html" class="text-primary font-medium hover:underline">เข้าสู่ระบบ</a>
      </div>
      </div><!-- /register-body -->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/password-toggle.js"></script>
  <script src="js/auth.js"></script>
  <script>
    var registeredEmail = '';

    // ===== Resend cooldown =====
    function startResendCooldown(seconds) {
      var btn = document.getElementById('resend-btn');
      var remaining = seconds;
      btn.disabled = true;
      btn.textContent = 'ส่งอีกครั้งใน ' + remaining + ' วินาที';
      var timer = setInterval(function () {
        remaining--;
        if (remaining <= 0) {
          clearInterval(timer);
          btn.disabled = false;
          btn.textContent = 'ส่งอีเมลอีกครั้ง';
        } else {
          btn.textContent = 'ส่งอีกครั้งใน ' + remaining + ' วินาที';
        }
      }, 1000);
    }

    // ===== Resend button handler =====
    document.getElementById('resend-btn').addEventListener('click', async function () {
      if (!registeredEmail) return;
      var statusEl = document.getElementById('resend-status');
      statusEl.classList.add('hidden');

      var result = await bizAuth.resendConfirmation(registeredEmail);
      if (result.error) {
        statusEl.textContent = result.error;
        statusEl.className = 'text-center text-xs mt-2 text-red-600';
      } else {
        statusEl.textContent = 'ส่งอีเมลใหม่แล้ว กรุณาตรวจสอบกล่องจดหมาย';
        statusEl.className = 'text-center text-xs mt-2 text-green-700';
      }
      statusEl.classList.remove('hidden');
      startResendCooldown(60);
    });

    // ===== Register form submit =====
    document.getElementById('register-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      var btn = document.getElementById('register-btn');
      var errorEl = document.getElementById('register-error');
      var successEl = document.getElementById('register-success');
      var bodyEl = document.getElementById('register-body');
      errorEl.classList.add('hidden');

      var name = document.getElementById('reg-name').value.trim();
      var email = document.getElementById('reg-email').value;
      var password = document.getElementById('reg-password').value;
      var passwordConfirm = document.getElementById('reg-password-confirm').value;

      if (password !== passwordConfirm) {
        errorEl.textContent = 'รหัสผ่านไม่ตรงกัน';
        errorEl.classList.remove('hidden');
        return;
      }

      btn.textContent = 'กำลังสมัคร...';
      btn.disabled = true;

      var result = await bizAuth.register(email, password, name);

      if (result.error) {
        errorEl.textContent = result.error;
        errorEl.classList.remove('hidden');
        btn.textContent = 'สมัครสมาชิก';
        btn.disabled = false;
      } else if (result.alreadyRegistered) {
        errorEl.innerHTML = 'อีเมลนี้มีบัญชีอยู่แล้ว <a href="login.html" class="underline font-semibold">เข้าสู่ระบบได้เลย →</a>';
        errorEl.classList.remove('hidden');
        btn.textContent = 'สมัครสมาชิก';
        btn.disabled = false;
      } else {
        registeredEmail = email;
        document.getElementById('success-email').textContent = email;
        bodyEl.classList.add('hidden');
        successEl.classList.remove('hidden');
        startResendCooldown(60);
      }
    });
  </script>
</body>
</html>
