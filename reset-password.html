<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <title>FriendTa - ตั้งรหัสผ่านใหม่</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'LINE Seed Sans TH', 'sans-serif'] },
          colors: { primary: '#2563eb', 'primary-container': '#3b82f6', surface: '#f7f9fb', 'surface-low': '#f2f4f6' }
        }
      }
    }
  </script>
</head>
<body class="font-sans bg-surface text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <span class="logo-font text-4xl"><img src="/assets/img/logo.png" alt="FriendTa" class="brand-logo"></span>
      <p class="text-sm text-slate-500 mt-2">ชุมชนหาเพื่อนคุย เพื่อนเที่ยว เพื่อนคู่ใจ</p>
    </div>

    <div class="bg-white border border-slate-200/60 rounded-2xl p-6">
      <h1 class="text-xl font-bold text-slate-900 mb-1">ตั้งรหัสผ่านใหม่</h1>
      <p class="text-sm text-slate-500 mb-6">กรอกรหัสผ่านใหม่ของคุณ</p>

      <div id="reset-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600"></div>

      <div id="reset-invalid" class="hidden mb-4 p-4 bg-amber-50 border border-amber-200 rounded-xl text-sm text-amber-800">
        ลิงก์รีเซ็ตไม่ถูกต้องหรือหมดอายุ กรุณา<a href="forgot-password.html" class="font-medium underline">ขอลิงก์ใหม่</a>
      </div>

      <form id="reset-form" class="hidden flex-col gap-4">
        <div>
          <label class="text-sm font-medium text-slate-700 mb-1.5 block">รหัสผ่านใหม่</label>
          <input type="password" id="new-password" required minlength="6" placeholder="อย่างน้อย 6 ตัวอักษร"
            class="w-full px-4 py-2.5 bg-slate-50 rounded-xl text-sm border border-transparent focus:border-primary/30 focus:bg-white focus:outline-none transition-colors">
        </div>
        <div>
          <label class="text-sm font-medium text-slate-700 mb-1.5 block">ยืนยันรหัสผ่าน</label>
          <input type="password" id="confirm-password" required minlength="6" placeholder="กรอกรหัสผ่านอีกครั้ง"
            class="w-full px-4 py-2.5 bg-slate-50 rounded-xl text-sm border border-transparent focus:border-primary/30 focus:bg-white focus:outline-none transition-colors">
        </div>
        <button type="submit" id="reset-btn" class="btn-primary w-full !py-2.5 mt-2">
          ตั้งรหัสผ่านใหม่
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/password-toggle.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Supabase client auto-detects recovery token จาก URL hash และสร้าง temp session ให้
    // ถ้าไม่มี session หลังโหลด = link หมดอายุหรือโดนใช้ไปแล้ว
    (async function () {
      var form = document.getElementById('reset-form');
      var invalid = document.getElementById('reset-invalid');
      // รอ supabase client process hash
      await new Promise(function (r) { setTimeout(r, 100); });
      var { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        form.classList.remove('hidden');
        form.classList.add('flex');
      } else {
        invalid.classList.remove('hidden');
      }
    })();

    document.getElementById('reset-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      var btn = document.getElementById('reset-btn');
      var errorEl = document.getElementById('reset-error');
      errorEl.classList.add('hidden');

      var newPass = document.getElementById('new-password').value;
      var confirmPass = document.getElementById('confirm-password').value;

      if (newPass !== confirmPass) {
        errorEl.textContent = 'รหัสผ่านไม่ตรงกัน';
        errorEl.classList.remove('hidden');
        return;
      }

      btn.textContent = 'กำลังตั้งรหัสผ่าน...';
      btn.disabled = true;

      var result = await bizAuth.updatePassword(newPass);

      if (result.error) {
        errorEl.textContent = result.error;
        errorEl.classList.remove('hidden');
        btn.textContent = 'ตั้งรหัสผ่านใหม่';
        btn.disabled = false;
      } else {
        window.location.href = 'network.html';
      }
    });
  </script>
</body>
</html>
